<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FitForge — Login</title>
  <meta name="description" content="Login to your FitForge account and start your fitness journey." />
  <link rel="stylesheet" href="styles/globals.css" />
  <link rel="stylesheet" href="styles/auth.css" />
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <!-- Animated background blobs -->
  <div class="auth-bg">
    <div class="auth-blob auth-blob-1"></div>
    <div class="auth-blob auth-blob-2"></div>
  </div>

  <div class="auth-wrapper">
    <!-- Back to home link -->
    <a href="index.html" class="auth-back-link">
      <i data-lucide="arrow-left"></i>
      <span>Back to Home</span>
    </a>

    <div class="auth-card glass animate-scale-in">
      <div class="auth-header">
        <a href="index.html" class="auth-logo">
          <span>🏋️</span>
          <span class="logo-text">Fit<span class="text-gradient">Forge</span></span>
        </a>
        <p class="text-muted" style="margin-top:8px;">Welcome back! Let's crush your goals.</p>
      </div>

      <!-- Tab switcher -->
      <div class="auth-tabs" role="tablist" style="margin-bottom: 24px;">
        <button class="auth-tab active" data-tab="login" type="button">Sign In</button>
        <button class="auth-tab" data-tab="signup" type="button">Sign Up</button>
      </div>

      <!-- ===== Sign In Form ===== -->
      <form id="login-form" class="auth-form active">
        <div class="form-group">
          <label for="login-email">Email</label>
          <div class="input-icon-wrap">
            <i data-lucide="mail" class="input-icon"></i>
            <input type="email" id="login-email" placeholder="you@example.com" required />
          </div>
        </div>
        <div class="form-group">
          <label for="login-password">Password</label>
          <div class="input-icon-wrap">
            <i data-lucide="lock" class="input-icon"></i>
            <input type="password" id="login-password" placeholder="••••••••" required />
          </div>
        </div>
        <div class="form-row-between">
          <label class="checkbox-label">
            <input type="checkbox" /> <span>Remember me</span>
          </label>
          <a href="#" id="forgot-password" class="text-small">Forgot password?</a>
        </div>
        <button type="submit" class="btn btn-primary btn-block" id="login-submit-btn">
          <i data-lucide="log-in"></i> Sign In
        </button>
        <div class="auth-divider"><span>or continue with</span></div>
        <button type="button" id="google-login" class="btn btn-google btn-block">
          <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59A14.5 14.5 0 019.5 24c0-1.59.28-3.14.76-4.59l-7.98-6.19A23.9 23.9 0 000 24c0 3.77.9 7.35 2.56 10.56l7.97-5.97z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 5.97C6.51 42.62 14.62 48 24 48z"/></svg>
          <span>Google</span>
        </button>
        <p class="auth-switch text-muted">
          Don't have an account? <a href="#" id="switch-to-signup">Sign Up</a>
        </p>
      </form>

      <!-- ===== Sign Up Form ===== -->
      <form id="signup-form" class="auth-form">
        <div class="form-group">
          <label for="signup-name">Full Name</label>
          <div class="input-icon-wrap">
            <i data-lucide="user" class="input-icon"></i>
            <input type="text" id="signup-name" placeholder="John Doe" required />
          </div>
        </div>
        <div class="form-group">
          <label for="signup-email">Email</label>
          <div class="input-icon-wrap">
            <i data-lucide="mail" class="input-icon"></i>
            <input type="email" id="signup-email" placeholder="you@example.com" required />
          </div>
        </div>
        <div class="form-group">
          <label for="signup-password">Password</label>
          <div class="input-icon-wrap">
            <i data-lucide="lock" class="input-icon"></i>
            <input type="password" id="signup-password" placeholder="Min 6 characters" required minlength="6" />
          </div>
        </div>
        <div class="form-group">
          <label for="signup-confirm">Confirm Password</label>
          <div class="input-icon-wrap">
            <i data-lucide="shield-check" class="input-icon"></i>
            <input type="password" id="signup-confirm" placeholder="Re-enter password" required minlength="6" />
          </div>
        </div>
        <button type="submit" class="btn btn-primary btn-block" id="signup-submit-btn">
          <i data-lucide="user-plus"></i> Create Account
        </button>
        <div class="auth-divider"><span>or continue with</span></div>
        <button type="button" id="google-signup" class="btn btn-google btn-block">
          <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59A14.5 14.5 0 019.5 24c0-1.59.28-3.14.76-4.59l-7.98-6.19A23.9 23.9 0 000 24c0 3.77.9 7.35 2.56 10.56l7.97-5.97z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 5.97C6.51 42.62 14.62 48 24 48z"/></svg>
          <span>Google</span>
        </button>
        <p class="auth-switch text-muted">
          Already have an account? <a href="#" id="switch-to-login">Sign In</a>
        </p>
      </form>
    </div>
  </div>

  <!-- Toast container -->
  <div id="toast-container" aria-live="polite"></div>

  <script type="module">
    // ── Toast (self-contained for this page) ──
    function showToast(message, type = 'info', duration = 3500) {
      const container = document.getElementById('toast-container');
      const colors = { success: 'var(--success)', error: 'var(--danger)', warning: 'var(--warning)', info: 'var(--info)' };
      const toast = document.createElement('div');
      toast.className = 'toast toast-' + type;
      toast.style.borderLeft = '4px solid ' + (colors[type] || colors.info);
      toast.textContent = message;
      container.appendChild(toast);
      requestAnimationFrame(() => toast.classList.add('toast-visible'));
      setTimeout(() => {
        toast.classList.remove('toast-visible');
        setTimeout(() => toast.remove(), 400);
      }, duration);
    }

    // ── Supabase check ──
    const SUPABASE_URL = 'https://higaguhjikdvugpcbcri.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhpZ2FndWhqaWtkdnVncGNiY3JpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE3OTM0MzcsImV4cCI6MjA5NzM2OTQzN30.Fn_TS12apPEPG_nkv-VWMLuANJlO2KY2eov-PBPCJrw';
    const isConfigured = SUPABASE_URL !== 'YOUR_SUPABASE_URL' && SUPABASE_ANON_KEY !== 'YOUR_SUPABASE_ANON_KEY';
    let supabaseClient = null;
    if (isConfigured && window.supabase) {
      supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    }

    // ── Init icons ──
    document.addEventListener('DOMContentLoaded', () => {
      if (window.lucide) lucide.createIcons();
    });

    // ── Tab switching ──
    const tabs = document.querySelectorAll('.auth-tab');
    const loginForm = document.getElementById('login-form');
    const signupForm = document.getElementById('signup-form');

    function switchTab(target) {
      tabs.forEach(t => t.classList.toggle('active', t.dataset.tab === target));
      loginForm.classList.toggle('active', target === 'login');
      signupForm.classList.toggle('active', target === 'signup');
    }

    tabs.forEach(tab => tab.addEventListener('click', () => switchTab(tab.dataset.tab)));
    document.getElementById('switch-to-signup')?.addEventListener('click', (e) => { e.preventDefault(); switchTab('signup'); });
    document.getElementById('switch-to-login')?.addEventListener('click', (e) => { e.preventDefault(); switchTab('login'); });

    // ── Sign In ──
    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value;
      const btn = document.getElementById('login-submit-btn');

      if (!email || !password) {
        showToast('Please fill in all fields.', 'warning');
        return;
      }

      btn.disabled = true;
      btn.innerHTML = '<i data-lucide="loader-2" class="animate-pulse"></i> Signing in…';

      if (!isConfigured) {
        // DEMO MODE — simulate login and go to dashboard
        setTimeout(() => {
          showToast('Demo mode — Signed in! Redirecting…', 'success');
          setTimeout(() => { window.location.href = 'dashboard.html'; }, 800);
        }, 600);
        return;
      }

      try {
        const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
        if (error) {
          showToast(error.message, 'error');
          btn.disabled = false;
          btn.innerHTML = '<i data-lucide="log-in"></i> Sign In';
          if (window.lucide) lucide.createIcons();
          return;
        }
        showToast('Welcome back! 💪', 'success');
        setTimeout(() => { window.location.href = 'dashboard.html'; }, 600);
      } catch (err) {
        showToast('Something went wrong. Please try again.', 'error');
        btn.disabled = false;
        btn.innerHTML = '<i data-lucide="log-in"></i> Sign In';
        if (window.lucide) lucide.createIcons();
      }
    });

    // ── Sign Up ──
    signupForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = document.getElementById('signup-name').value.trim();
      const email = document.getElementById('signup-email').value.trim();
      const password = document.getElementById('signup-password').value;
      const confirm = document.getElementById('signup-confirm').value;
      const btn = document.getElementById('signup-submit-btn');

      if (!name || !email || !password || !confirm) {
        showToast('Please fill in all fields.', 'warning');
        return;
      }
      if (password !== confirm) {
        showToast('Passwords do not match.', 'warning');
        return;
      }
      if (password.length < 6) {
        showToast('Password must be at least 6 characters.', 'warning');
        return;
      }

      btn.disabled = true;
      btn.innerHTML = '<i data-lucide="loader-2" class="animate-pulse"></i> Creating account…';

      if (!isConfigured) {
        // DEMO MODE
        setTimeout(() => {
          showToast('Demo mode — Account created! Redirecting…', 'success');
          setTimeout(() => { window.location.href = 'dashboard.html'; }, 800);
        }, 600);
        return;
      }

      try {
        const { data, error } = await supabaseClient.auth.signUp({
          email, password,
          options: { data: { full_name: name } }
        });
        if (error) {
          showToast(error.message, 'error');
          btn.disabled = false;
          btn.innerHTML = '<i data-lucide="user-plus"></i> Create Account';
          if (window.lucide) lucide.createIcons();
          return;
        }
        if (data?.user && !data.session) {
          showToast('Check your email to confirm your account!', 'success', 5000);
        } else {
          showToast('Account created! Welcome to FitForge! 💪', 'success');
          setTimeout(() => { window.location.href = 'dashboard.html'; }, 600);
        }
      } catch (err) {
        showToast('Something went wrong. Please try again.', 'error');
        btn.disabled = false;
        btn.innerHTML = '<i data-lucide="user-plus"></i> Create Account';
        if (window.lucide) lucide.createIcons();
      }
    });

    // ── Google Auth ──
    async function handleGoogle() {
      if (!isConfigured) {
        showToast('Demo mode — Google auth requires Supabase config. Redirecting to dashboard…', 'info');
        setTimeout(() => { window.location.href = 'dashboard.html'; }, 1000);
        return;
      }
      try {
        const { error } = await supabaseClient.auth.signInWithOAuth({
          provider: 'google',
          options: { redirectTo: window.location.origin + '/dashboard.html' }
        });
        if (error) showToast(error.message, 'error');
      } catch (err) {
        showToast('Google sign in failed.', 'error');
      }
    }
    document.getElementById('google-login').addEventListener('click', handleGoogle);
    document.getElementById('google-signup').addEventListener('click', handleGoogle);
  </script>
</body>
</html>
